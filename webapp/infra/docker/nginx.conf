server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API paths to the api container. The api routes are mounted at
    # the FastAPI root (no /api prefix), so we route each top-level prefix
    # explicitly. Add to this list when new top-level routers are mounted
    # in app_factory.py.
    #
    # Note: the api's GET "/" endpoint is intentionally NOT proxied because
    # the SPA needs `/` to serve index.html. That endpoint becomes
    # unreachable through the proxy; access via internal docker network only.
    location ~ ^/(auth|admin|agents|chat|data-store|demos|deployments|echo|health|log|mcp|providers|rest|sessions|specs|users)(/|$) {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # SPA fallback for everything else (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
